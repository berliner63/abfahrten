<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <title>Abfahrten Stendaler/Quedlinburger Str. â†’ Betriebshof Marzahn</title>
  <style>
    :root {
      --bg: #000;
      --card: #111;
      --line: #222;
      --text: #fff;
      --muted: #a0a0a0;
      --error: #ef9a9a;

      --fs-row: 24px;
      --fs-meta: 24px;
      --radius: 10px;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Roboto Condensed", Arial, sans-serif;
      padding: 8px;
    }

    .departures {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 2px 12px #0008;
      overflow: hidden;
    }

    .meta,
    .err {
      padding: 14px 12px;
      text-align: center;
      font-size: var(--fs-meta);
    }

    .rows { padding: 0 12px; }

    .dep-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      column-gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-size: var(--fs-row);
      line-height: 1.1;
    }

    .dep-row:last-child { border-bottom: 0; }

    .line {
      font-weight: 700;
      white-space: nowrap;
    }

    .direction {
      color: #c8c8c8;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .time {
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
      min-width: 3.2em;
    }

    .meta { color: var(--muted); }
    .err { color: var(--error); }

    .remarks {
      grid-column: 1 / -1;
      font-size: 0.75em;
      color: #ffcc00;
      padding-top: 4px;
      white-space: normal;
    }
  </style>
</head>
<body>
  <main class="departures" id="departures" aria-live="polite">
    <div class="rows" id="rows">
      <div class="meta">Lade Abfahrten &hellip;</div>
    </div>
  </main>

  <script>
    const FROM_STOP = "900175011";
    const TO_STOP = "900170010";
    const API_BASES = ["https://v6.bvg.transport.rest", "https://v6.vbb.transport.rest"];
    const MAX_RESULTS = 3;
    const REFRESH_MS = 60000;

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatTime(iso) {
      if (!iso) return "--:--";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "--:--";
      return d.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
    }

    function formatNow() {
      const d = new Date();
      return "Aktualisiert: " + d.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    async function fetchWithRetry(url, retries = 2) {
      let lastError;
      for (let i = 0; i <= retries; i++) {
        try {
          const res = await fetch(url, { cache: "no-store" });
          if (res.ok) return res;
          lastError = new Error(`HTTP ${res.status}`);
        } catch (e) {
          lastError = e;
        }
      }
      throw lastError || new Error("Netzwerkfehler");
    }

    async function fetchDepartures() {
      let lastErr;
      for (const base of API_BASES) {
        try {
          const url = `${base}/stops/${FROM_STOP}/departures?duration=90&results=20&language=de`;
          const res = await fetchWithRetry(url);
          const data = await res.json();
          return Array.isArray(data.departures) ? data.departures : [];
        } catch (e) {
          lastErr = e;
        }
      }
      throw lastErr || new Error("API nicht erreichbar");
    }

    async function tripHasStop(tripId) {
      if (!tripId) return false;
      for (const base of API_BASES) {
        try {
          const url = `${base}/trips/${encodeURIComponent(tripId)}?stopovers=true&language=de`;
          const res = await fetchWithRetry(url);
          const data = await res.json();

          const stopovers = data?.trip?.stopovers;
          if (!Array.isArray(stopovers)) continue;

          const fromIndex = stopovers.findIndex(s => String(s?.stop?.id || "") === FROM_STOP);
          const future = fromIndex >= 0 ? stopovers.slice(fromIndex + 1) : stopovers;

          return future.some(s => String(s?.stop?.id || "") === TO_STOP);
        } catch (_) {}
      }
      return false;
    }

    const LINES_WITH_REMARKS = ["M6", "18"];

    function renderRows(deps) {
      const rows = document.getElementById("rows");
      if (!deps.length) {
        rows.innerHTML = `<div class="meta">Keine passenden Abfahrten gefunden.</div>`;
        return;
      }

      rows.innerHTML = deps.map(dep => {
        const line = escapeHtml(dep?.line?.name || "-");
        const direction = escapeHtml(dep?.direction || "-");
        const time = escapeHtml(formatTime(dep?.when));

        let remarksHtml = "";
        if (LINES_WITH_REMARKS.includes(dep?.line?.name) && Array.isArray(dep.remarks)) {
          const warnings = dep.remarks
            .filter(r => r.type === "warning" || r.type === "status")
            .map(r => escapeHtml(r.text || r.summary || ""))
            .filter(Boolean);
          if (warnings.length) {
            remarksHtml = `<span class="remarks">&#x26A0;&#xFE0F; ${warnings.join(" &middot; ")}</span>`;
          }
        }

        return `
          <div class="dep-row">
            <span class="line">${line}</span>
            <span class="direction" title="${direction}">${direction}</span>
            <span class="time">${time}</span>
            ${remarksHtml}
          </div>
        `;
      }).join("");
    }

    async function load() {
      const rows = document.getElementById("rows");
      rows.innerHTML = `<div class="meta">Lade Abfahrten &hellip;</div>`;

      try {
        const deps = await fetchDepartures();
        const filtered = [];

        for (const dep of deps) {
          if (filtered.length >= MAX_RESULTS) break;
          if (await tripHasStop(dep?.tripId)) filtered.push(dep);
        }

        renderRows(filtered);
      } catch (e) {
        rows.innerHTML = `<div class="err">${escapeHtml(e?.message || "Unbekannter Fehler")}</div>`;
      }
    }

    load();
    setInterval(load, REFRESH_MS);
  </script>
</body>
</html>
