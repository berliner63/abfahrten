<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Abweichungen</title>
  <link rel="icon" type="image/png" href="./logo.png">
  <link rel="shortcut icon" href="./logo.png">
  <link rel="apple-touch-icon" href="./logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
  <style>
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      box-sizing: border-box;
      background: #000;
      color: #fff;
      font-family: 'Roboto Condensed', sans-serif;
    }
    .wrap {
      width: 100%;
      max-width: 460px;
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 34px;
      line-height: 1.1;
      text-align: center;
    }
    .sub {
      margin: 0 0 20px 0;
      color: #aaa;
      font-size: 15px;
      text-align: center;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .nav-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      border: 1px solid #333;
      background: #111;
      color: #fff;
      text-decoration: none;
      font-size: 22px;
      line-height: 1.2;
      text-align: center;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .nav-button:hover {
      background: #1b1b1b;
      border-color: #555;
    }
    .nav-icon {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: 1px solid #333;
      background: #000;
      padding: 4px;
      box-sizing: border-box;
    }
    .nav-icon img {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .nav-label {
      flex: 1 1 auto;
    }
    .nav-button.sbahn .nav-icon,
    .nav-button.ubahn .nav-icon {
      padding: 5px;
    }
    @media (max-width: 1024px), (pointer: coarse) {
      h1 {
        font-size: 28px;
      }
      .sub {
        font-size: 14px;
      }
      .nav-button {
        font-size: 20px;
        padding: 16px 14px;
      }
      .nav-icon {
        width: 36px;
        height: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Abweichungen</h1>
    <p class="sub">Wähle eine Übersicht für Tram, Bus, S-Bahn oder U-Bahn.</p>

    <div class="buttons">
      <a class="nav-button tram" href="./TramAbweichungen.html"><span class="nav-icon" aria-hidden="true"><img src="./logos/tram.svg" alt=""></span><span class="nav-label">Tram-Abweichungen</span></a>
      <a class="nav-button bus" href="./BusAbweichungen.html"><span class="nav-icon" aria-hidden="true"><img src="./logos/bus.svg" alt=""></span><span class="nav-label">Bus-Abweichungen</span></a>
      <a class="nav-button sbahn" href="./SBahnAbweichungen.html"><span class="nav-icon" aria-hidden="true"><img src="./logos/sbahn.svg" alt=""></span><span class="nav-label">S-Bahn-Abweichungen</span></a>
      <a class="nav-button ubahn" href="./UBahnAbweichungen.html"><span class="nav-icon" aria-hidden="true"><img src="./logos/ubahn.svg" alt=""></span><span class="nav-label">U-Bahn-Abweichungen</span></a>
    </div>
  </div>
</body>
</html>
