<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Abfahrtsanzeige U Hellersdorf</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; }
    table { border-collapse: collapse; width: 100%; max-width: 600px; margin: 40px auto; background: #fff; }
    th, td { border: 1px solid #ccc; padding: 12px 8px; text-align: left; }
    th { background: #e0e0e0; }
    tr:nth-child(even) { background: #f2f2f2; }
    h1 { text-align: center; margin-top: 30px; }
  </style>
</head>
<body>
  <h1>Abfahrtsanzeige U Hellersdorf</h1>
  <div id="debug" style="max-width:600px;margin:0 auto 20px auto;font-size:13px;color:#555;background:#f9f9f9;border:1px solid #eee;padding:8px;display:none"></div>
  <div id="loader" style="text-align:center;margin:40px;">
    <span style="display:inline-block;width:40px;height:40px;border:4px solid #ccc;border-top:4px solid #333;border-radius:50%;animation:spin 1s linear infinite;"></span>
    <div style="margin-top:10px;color:#888;">Lade Abfahrten...</div>
  </div>
  <table style="display:none;" id="departuresTable">
    <thead>
      <tr>
        <th>Linie</th>
        <th>Ziel</th>
        <th>Abfahrtszeit SOLL</th>
        <th>Abfahrtszeit IST</th>
      </tr>
    </thead>
    <tbody id="departures">
      <!-- Dynamische Daten werden hier eingefügt -->
    </tbody>
  </table>
  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <script>
    async function getStopId() {
      try {
        const response = await fetch('https://v6.bvg.transport.rest/locations?query=U%20Hellersdorf');
        const data = await response.json();
        if (data && data.length > 0) {
          return data[0].id;
        }
      } catch (e) {
        return null;
      }
      return null;
    }

    async function getDepartures(stopId) {
      try {
        const response = await fetch(`https://v6.bvg.transport.rest/stops/${stopId}/departures?duration=30`);
        const data = await response.json();
        return data;
      } catch (e) {
        return null;
      }
    }

    function formatTime(dateString) {
      const date = new Date(dateString);
      return date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    }

    async function loadDepartures() {
      const loader = document.getElementById('loader');
      const table = document.getElementById('departuresTable');
      const debug = document.getElementById('debug');
      loader.style.display = 'block';
      table.style.display = 'none';
      debug.style.display = 'none';
      const stopId = await getStopId();
      const tbody = document.getElementById('departures');
      tbody.innerHTML = '';
      debug.innerHTML = '';
      if (!stopId) {
        loader.style.display = 'none';
        table.style.display = 'block';
        debug.style.display = 'block';
        debug.innerHTML = '<b>Debug:</b> Haltestellen-ID nicht gefunden.';
        tbody.innerHTML = '<tr><td colspan="4">Haltestellen-ID nicht gefunden oder API nicht erreichbar</td></tr>';
        return;
      }
      debug.style.display = 'block';
      debug.innerHTML = `<b>Debug:</b> Haltestellen-ID: <code>${stopId}</code>`;
      const departures = await getDepartures(stopId);
      loader.style.display = 'none';
      table.style.display = 'block';
      let depList = Array.isArray(departures) ? departures : (departures && departures.departures ? departures.departures : []);
      if (!depList || depList.length === 0) {
        debug.innerHTML += '<br><b>Debug:</b> Keine Abfahrten oder API-Fehler.<br>Rohdaten:<br><pre>' + JSON.stringify(departures, null, 2) + '</pre>';
        tbody.innerHTML = '<tr><td colspan="4">Keine Abfahrten gefunden oder API-Fehler</td></tr>';
        return;
      }
      debug.innerHTML += '<br><b>Debug:</b> Rohdaten:<br><pre>' + JSON.stringify(departures, null, 2) + '</pre>';
      depList.forEach(dep => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${dep.line && dep.line.name ? dep.line.name : ''}</td>
          <td>${dep.destination && dep.destination.name ? dep.destination.name : (dep.direction || '')}</td>
          <td>${dep.plannedWhen ? formatTime(dep.plannedWhen) : ''}</td>
          <td>${dep.when ? formatTime(dep.when) : ''}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    loadDepartures();
    setInterval(loadDepartures, 60000);
  </script>
</body>
</html>
