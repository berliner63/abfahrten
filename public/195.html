<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bus 195 – Live Positionen</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
    h1 { margin-bottom: 5px; }
    #status { padding: 8px; margin-bottom: 15px; border-radius: 5px; font-weight: bold; }
    .live { background: #c8f7c5; border: 1px solid #4caf50; }
    .fallback { background: #fff3cd; border: 1px solid #ffca2c; }
    .error { background: #f8d7da; border: 1px solid #f5c2c7; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: left; }
    th { background: #eee; }
</style>
</head>
<body>

<h1>Bus 195 – Live Positionen</h1>
<div id="status">Lade Daten…</div>

<table id="t195table">
    <thead>
        <tr>
            <th>Fahrzeug</th>
            <th>Richtung</th>
            <th>Nächste Haltestelle</th>
            <th>Entfernung</th>
            <th>Verspätung</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
function cleanDisplayName(value) {
    return String(value || "").replace(/\s*\(Berlin\)\s*/gi, " ").replace(/\s{2,}/g, " ").trim();
}

// Distanzberechnung
function distance(a, b) {
    const R = 6371e3;
    const toRad = x => x * Math.PI / 180;
    const dLat = toRad(b.latitude - a.latitude);
    const dLon = toRad(b.longitude - a.longitude);
    const lat1 = toRad(a.latitude);
    const lat2 = toRad(b.latitude);
    const h = Math.sin(dLat/2)**2 +
              Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1-h));
}

async function loadData() {
    const status = document.getElementById("status");
    const tableBody = document.querySelector("#t195table tbody");
    tableBody.innerHTML = "<tr><td colspan='5'>Lade Daten…</td></tr>";

    // 1. Haltestellen der 195 über Trip-API laden
    let stops;
    try {
        const tripRes = await fetch("https://v6.bvg.transport.rest/trips?lineName=195&results=1");
        const tripData = await tripRes.json();

        if (!tripData[0]?.stopovers) {
            throw new Error("Keine Stopps verfügbar");
        }

        stops = tripData[0].stopovers.map(s => ({
            id: s.stop.id,
            name: cleanDisplayName(s.stop.name),
            location: s.stop.location
        }));
    } catch (e) {
        status.textContent = "Fehler: Haltestellen konnten nicht geladen werden.";
        status.className = "error";
        tableBody.innerHTML = "<tr><td colspan='5'>Keine Daten verfügbar.</td></tr>";
        return;
    }

    // 2. Radar-Daten laden (Bus)
    let radarData = [];
    try {
        const radarRes = await fetch(
            "https://v6.bvg.transport.rest/radar?products=bus&north=52.60&south=52.48&east=13.70&west=13.45"
        );
        radarData = await radarRes.json();
    } catch {
        radarData = [];
    }

    const bus195 = radarData.filter(v => v.line?.name === "195");

    tableBody.innerHTML = "";

    // 3. Live-Daten verfügbar
    if (bus195.length > 0) {
        status.textContent = "Live-Daten aktiv";
        status.className = "live";

        bus195.forEach(v => {
            const nearest = stops
                .map(stop => ({
                    stop,
                    dist: distance(v.location, stop.location)
                }))
                .sort((a,b) => a.dist - b.dist)[0];

            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${v.tripId || "–"}</td>
                <td>${cleanDisplayName(v.direction) || "–"}</td>
                <td>${cleanDisplayName(nearest.stop.name)}</td>
                <td>${Math.round(nearest.dist)} m</td>
                <td>${v.delay ? (v.delay/60).toFixed(1) + " min" : "0 min"}</td>
            `;
            tableBody.appendChild(row);
        });

        return;
    }

    // 4. Fallback: Fahrplan
    status.textContent = "Keine Live-Daten – Fahrplan wird angezeigt";
    status.className = "fallback";

    try {
        const firstStop = stops[0].id;

        const depRes = await fetch(
            `https://v6.bvg.transport.rest/stops/${firstStop}/departures?duration=60`
        );
        const depData = await depRes.json();

        const bus195dep = depData.filter(d => d.line?.name === "195");

        if (bus195dep.length === 0) {
            tableBody.innerHTML = "<tr><td colspan='5'>Keine 195-Fahrten im Fahrplan gefunden.</td></tr>";
            return;
        }

        bus195dep.forEach(d => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>–</td>
                <td>${cleanDisplayName(d.direction)}</td>
                <td>${cleanDisplayName(d.stop.name)}</td>
                <td>–</td>
                <td>${d.delay ? (d.delay/60).toFixed(1) + " min" : "0 min"}</td>
            `;
            tableBody.appendChild(row);
        });

    } catch {
        tableBody.innerHTML = "<tr><td colspan='5'>Fehler beim Laden der Fahrplan-Daten.</td></tr>";
    }
}

loadData();
setInterval(loadData, 10000);
</script>

</body>
</html>
