<!-- Automatischer Reload alle 10 Minuten -->
<script>
setTimeout(() => {
    location.reload();
}, 10 * 60 * 1000);
</script>

<!-- Wake Lock: Bildschirm wach halten -->
<script>
let wakeLock = null;

async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => {
            setTimeout(requestWakeLock, 1000);
        });
    } catch (err) {
        console.warn('Wake Lock fehlgeschlagen:', err);
    }
}

document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
        requestWakeLock();
    }
});

requestWakeLock();
</script>

</head>

<body>

<!-- Datum + Uhrzeit -->
<div id="header"></div>

<script>
function updateHeader() {
    const now = new Date();

    const date = now.toLocaleDateString("de-DE", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
    });

    const weekday = now.toLocaleDateString("de-DE", {
        weekday: "long"
    });

    const time = now.toLocaleTimeString("de-DE", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
    });

    document.getElementById("header").textContent =
        `${date} – ${weekday} – ${time}`;
}
setInterval(updateHeader, 1000);
updateHeader();
</script>

<!-- Mini‑Ticker (1 Punkt pro Sekunde, Reset nach 60) -->
<div id="ticker">•</div>

<script>
let count = 1;

setInterval(() => {
    count = (count % 60) + 1;
    document.getElementById("ticker").textContent = "•".repeat(count);
}, 1000);
</script>
