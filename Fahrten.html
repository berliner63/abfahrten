<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Fahrten</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Roboto Condensed', sans-serif; background: #000; color: #fff; }
    .header-row {
      width: 100%;
      max-width: 720px;
      margin: 24px auto 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .toggle-controls {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 16px;
      background: #111;
      color: #fff;
      border: 1px solid #333;
      padding: 8px 10px;
      cursor: pointer;
    }
    .toggle-controls:hover { background: #1b1b1b; }
    .controls { width: 100%; max-width: 720px; margin: 16px auto 0 auto; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .controls input, .controls select, .controls button {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 18px;
      background: #111;
      color: #fff;
      border: 1px solid #333;
      padding: 8px 10px;
    }
    .controls input { flex: 1 1 260px; }
    .controls select { flex: 2 1 360px; }
    .controls button { cursor: pointer; }
    .controls button:hover { background: #1b1b1b; }
    table { border-collapse: collapse; width: 100%; max-width: 720px; margin: 40px auto; background: #000; }
    th, td { border: 1px solid #333; padding: 12px 8px; text-align: left; color: #fff; }
    th { background: #111; }
    tr:nth-child(even) { background: #0d0d0d; }
    h1 { margin: 0; }
    .abweichung-zu-frueh { color: #d32f2f; font-weight: bold; }
    .abweichung-zu-spaet { color: #fbc02d; font-weight: bold; }
    .abweichung-puenktlich { color: #388e3c; font-weight: bold; }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header-row">
    <h1 id="pageTitle">U Hellersdorf (Berlin)</h1>
    <button id="toggleControlsButton" class="toggle-controls" type="button">Suche ausblenden</button>
  </div>
  <div class="controls" id="searchControls">
    <input id="stopQuery" type="text" value="U Hellersdorf" placeholder="Haltestelle suchen">
    <button id="searchButton" type="button">Suchen</button>
    <select id="stopSelect" aria-label="Gefundene Haltestellen"></select>
    <button id="applyStopButton" type="button">Übernehmen</button>
  </div>
  <div id="loader" style="text-align:center;margin:40px;">
    <span style="display:inline-block;width:40px;height:40px;border:4px solid #444;border-top:4px solid #fff;border-radius:50%;animation:spin 1s linear infinite;"></span>
    <div style="margin-top:10px;color:#fff;">Lade Abfahrten...</div>
  </div>
  <table style="display:none;" id="departuresTable">
    <thead>
      <tr>
        <th>Linie</th>
        <th>Ziel</th>
        <th>Abfahrtszeit</th>
        <th>Abweichung</th>
      </tr>
    </thead>
    <tbody id="departures">
      <!-- Dynamische Daten werden hier eingefügt -->
    </tbody>
  </table>
  
  <script>
    const DEFAULT_STOP_ID = '900175007';
    const DEFAULT_STOP_NAME = 'U Hellersdorf (Berlin)';
    let selectedStopId = DEFAULT_STOP_ID;
    let selectedStopName = DEFAULT_STOP_NAME;

    function updateTitle() {
      document.getElementById('pageTitle').textContent = `${selectedStopName}`;
    }

    function updateUrl(stopId, stopName) {
      const url = new URL(window.location.href);
      url.searchParams.set('stopId', stopId);
      url.searchParams.set('stopName', stopName);
      window.history.replaceState({}, '', url.toString());
    }

    function readStopFromUrl() {
      const url = new URL(window.location.href);
      const stopId = url.searchParams.get('stopId');
      const stopName = url.searchParams.get('stopName');
      if (stopId) {
        selectedStopId = stopId;
      }
      if (stopName) {
        selectedStopName = stopName;
      }
      document.getElementById('stopQuery').value = selectedStopName;
    }

    function fillStopSelect(stops) {
      const select = document.getElementById('stopSelect');
      select.innerHTML = '';
      stops.forEach((stop, index) => {
        const option = document.createElement('option');
        option.value = stop.id;
        option.textContent = stop.name;
        option.dataset.name = stop.name;
        if (index === 0) option.selected = true;
        select.appendChild(option);
      });
    }

    async function searchStops(query) {
      try {
        const response = await fetch(`https://v6.bvg.transport.rest/locations?query=${encodeURIComponent(query)}`);
        const data = await response.json();
        if (!Array.isArray(data)) return [];
        return data.filter((item) => item.type === 'stop' && item.id && item.name);
      } catch (e) {
        return [];
      }
    }

    async function getDepartures(stopId) {
      try {
        const response = await fetch(`https://v6.bvg.transport.rest/stops/${stopId}/departures?duration=30`);
        const data = await response.json();
        return data;
      } catch (e) {
        return null;
      }
    }

    function formatTime(dateString) {
      const date = new Date(dateString);
      return date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    }

    async function loadDepartures() {
      const loader = document.getElementById('loader');
      const table = document.getElementById('departuresTable');
      loader.style.display = 'block';
      table.style.display = 'none';
      const tbody = document.getElementById('departures');
      tbody.innerHTML = '';
      if (!selectedStopId) {
        loader.style.display = 'none';
        table.style.display = 'block';
        tbody.innerHTML = '<tr><td colspan="4">Haltestellen-ID nicht gefunden oder API nicht erreichbar</td></tr>';
        return;
      }
      updateTitle();
      const departures = await getDepartures(selectedStopId);
      loader.style.display = 'none';
      table.style.display = 'block';
      let depList = Array.isArray(departures) ? departures : (departures && departures.departures ? departures.departures : []);
      if (!depList || depList.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4">Keine Abfahrten gefunden oder API-Fehler</td></tr>';
        return;
      }
      depList.slice(0, 11).forEach(dep => {
        // Abweichung berechnen
        let abweichung = 0;
        let planned = dep.plannedWhen ? new Date(dep.plannedWhen) : null;
        let actual = dep.when ? new Date(dep.when) : null;
        let abweichungText = '';
        let abweichungClass = '';
        if (planned && actual) {
          abweichung = Math.round((actual - planned) / 60000); // Minuten
          if (abweichung < 0) {
            abweichungText = '-' + Math.abs(abweichung);
            abweichungClass = 'abweichung-zu-frueh';
          } else if (abweichung > 0) {
            abweichungText = '+' + abweichung;
            abweichungClass = 'abweichung-zu-spaet';
          } else {
            abweichungText = '0';
            abweichungClass = 'abweichung-puenktlich';
          }
        } else {
          abweichungText = '';
        }
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${dep.line && dep.line.name ? dep.line.name : ''}</td>
          <td>${(dep.direction || '').replace(/->/g, '>')}</td>
          <td>${dep.plannedWhen ? formatTime(dep.plannedWhen) : ''}</td>
          <td><span class="${abweichungClass}">${abweichungText}</span></td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function onSearchStops() {
      const query = document.getElementById('stopQuery').value.trim();
      if (!query) return;
      const stops = await searchStops(query);
      if (stops.length === 0) {
        const select = document.getElementById('stopSelect');
        select.innerHTML = '';
        const option = document.createElement('option');
        option.value = '';
        option.textContent = 'Keine Haltestellen gefunden';
        select.appendChild(option);
        return;
      }
      fillStopSelect(stops);
    }

    function onApplySelectedStop() {
      const select = document.getElementById('stopSelect');
      const option = select.options[select.selectedIndex];
      if (!option || !option.value) return;
      selectedStopId = option.value;
      selectedStopName = option.dataset.name || option.textContent;
      updateUrl(selectedStopId, selectedStopName);
      loadDepartures();
    }

    function toggleSearchControls() {
      const controls = document.getElementById('searchControls');
      const button = document.getElementById('toggleControlsButton');
      const isHidden = controls.style.display === 'none';
      controls.style.display = isHidden ? 'flex' : 'none';
      button.textContent = isHidden ? 'Suche ausblenden' : 'Suche einblenden';
    }

    document.getElementById('searchButton').addEventListener('click', onSearchStops);
    document.getElementById('applyStopButton').addEventListener('click', onApplySelectedStop);
    document.getElementById('toggleControlsButton').addEventListener('click', toggleSearchControls);
    document.getElementById('stopQuery').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        onSearchStops();
      }
    });

    readStopFromUrl();
    fillStopSelect([{ id: selectedStopId, name: selectedStopName }]);
    loadDepartures();
    setInterval(loadDepartures, 60000);
  </script>
</body>
</html>
